<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Owner's Rep Playbook — Cover</title>
<style>
  @import url("https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700;9..144,800&family=JetBrains+Mono:wght@500;600&display=swap");

  html, body { margin: 0; padding: 0; background: #11243e; }
  body { width: 1280px; height: 1280px; overflow: hidden; position: relative; }

  .cover {
    position: relative;
    width: 1280px;
    height: 1280px;
    overflow: hidden;
    background:
      radial-gradient(ellipse 60% 55% at 0% 0%, rgba(212,160,80,0.18), transparent 65%),
      radial-gradient(ellipse 55% 60% at 100% 100%, rgba(85,140,200,0.32), transparent 65%),
      linear-gradient(160deg, #15304f 0%, #11243e 55%, #0d1d33 100%);
    font-family: 'Inter', system-ui, sans-serif;
    color: #f5e9cf;
  }

  /* Blueprint grid */
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(212,160,80,.10) 1px, transparent 1px),
      linear-gradient(90deg, rgba(212,160,80,.10) 1px, transparent 1px);
    background-size: 28px 28px;
    -webkit-mask-image: radial-gradient(ellipse 75% 65% at 50% 45%, black, transparent 90%);
            mask-image: radial-gradient(ellipse 75% 65% at 50% 45%, black, transparent 90%);
  }

  /* Architectural dimension corner */
  .dim-corner {
    position: absolute; top: 60px; right: 80px; width: 140px; height: 14px;
  }
  .dim-corner::before, .dim-corner::after {
    content: ""; position: absolute; top: 0; width: 1px; height: 14px;
    background: rgba(212,160,80,.7);
  }
  .dim-corner::before { left: 0; } .dim-corner::after { right: 0; }
  .dim-corner > span {
    position: absolute; top: 7px; left: 0; right: 0; height: 1px;
    background: rgba(212,160,80,.7);
  }

  /* Bottom glow */
  .glow-bottom {
    position: absolute; left: 0; right: 0; bottom: 0; height: 280px;
    background: linear-gradient(180deg, transparent, rgba(8,18,36,.6));
    pointer-events: none;
  }

  .rule {
    position: absolute; left: 80px; right: 80px;
    height: 1px; background: rgba(245,233,207,.20);
  }
  .rule-top { top: 120px; }
  .rule-bottom { bottom: 160px; }

  .eyebrow {
    position: absolute; top: 90px; left: 80px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px; letter-spacing: .22em;
    color: #d4a050; font-weight: 600;
  }

  .hero {
    position: absolute; left: 80px; right: 80px;
    top: 290px;
  }
  .hero .line1 {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 600; font-size: 130px; line-height: 1.0;
    letter-spacing: -0.03em; color: #f5e9cf;
    margin: 0;
  }
  .hero .line2-wrap {
    position: relative; display: inline-block;
    margin: 28px 0 0;
  }
  .hero .line2 {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 700; font-size: 240px; line-height: 1.0;
    letter-spacing: -0.045em; color: #f5e9cf;
    display: inline-block;
  }
  .hero .underline-warm {
    position: absolute; left: 0; right: 0; bottom: 18px; height: 38px;
    background: linear-gradient(90deg, #d4a050, #b8842e);
    opacity: 0.98;
    z-index: -1;
    border-radius: 2px;
  }
  .hero .sub {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 500; font-style: italic;
    font-size: 50px; line-height: 1.18; color: #e5d7ad;
    margin: 60px 0 0;
    max-width: 980px;
  }

  .vertical-mark {
    position: absolute;
    left: 36px; top: 720px;
    transform: rotate(-90deg); transform-origin: left top;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; letter-spacing: .42em;
    color: rgba(245,233,207,.45); font-weight: 600;
    white-space: nowrap;
  }

  .bottom {
    position: absolute; left: 80px; right: 80px; bottom: 80px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .bottom .mark {
    width: 56px; height: 56px; border-radius: 12px;
    background: rgba(212,160,80,.18);
    border: 1px solid rgba(212,160,80,.45);
    display: grid; place-items: center;
  }
  .bottom .stats {
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px; letter-spacing: .32em;
    color: #f5e9cf; font-weight: 600;
  }
  .bottom .price {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 700; font-size: 64px;
    color: #d4a050; line-height: 1;
  }
</style>
</head>
<body>
<div class="cover">
  <div class="grid"></div>
  <div class="dim-corner"><span></span></div>

  <div class="rule rule-top"></div>
  <div class="eyebrow">MANUAL №&nbsp;002 · A FIELD GUIDE FOR HOMEOWNERS</div>

  <div class="vertical-mark">JOSHUA BETESH · BUILT RIGHT TOOLS</div>

  <div class="hero">
    <div class="line1">The Owner's Rep</div>
    <div class="line2-wrap">
      <div class="underline-warm"></div>
      <div class="line2">Playbook.</div>
    </div>
    <div class="sub">Run a major renovation like a<br/>professional owner's rep.</div>
  </div>

  <div class="glow-bottom"></div>
  <div class="rule rule-bottom"></div>
  <div class="bottom">
    <div class="mark" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="#d4a050" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="9" width="18" height="6" rx="1"/>
        <path d="M7 9v3M11 9v4M15 9v3M19 9v4"/>
      </svg>
    </div>
    <div class="stats">55 PROMPTS&nbsp;&nbsp;·&nbsp;&nbsp;13 PHASES&nbsp;&nbsp;·&nbsp;&nbsp;PDF</div>
    <div class="price">$27</div>
  </div>
</div>
</body>
</html>
