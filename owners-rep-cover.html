<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Owner's Rep Playbook — Cover</title>
<style>
  @import url("https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=JetBrains+Mono:wght@500;600&display=swap");

  html, body { margin: 0; padding: 0; background: #fcf8ef; }
  body { width: 1280px; height: 1280px; overflow: hidden; position: relative; }

  .cover {
    position: relative;
    width: 1280px;
    height: 1280px;
    background: #fcf8ef;
    font-family: 'Inter', system-ui, sans-serif;
    color: #1a1814;
  }

  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(30,58,95,.13) 1px, transparent 1px),
      linear-gradient(90deg, rgba(30,58,95,.13) 1px, transparent 1px);
    background-size: 28px 28px;
    -webkit-mask-image: radial-gradient(ellipse 72% 60% at 50% 45%, black, transparent 85%);
            mask-image: radial-gradient(ellipse 72% 60% at 50% 45%, black, transparent 85%);
  }

  .rule {
    position: absolute; left: 80px; right: 80px;
    height: 1px; background: rgba(26,24,20,.12);
  }
  .rule-top { top: 120px; }
  .rule-bottom { bottom: 160px; }

  .eyebrow {
    position: absolute; top: 90px; left: 80px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px; letter-spacing: .22em;
    color: #a47139; font-weight: 600;
  }
  .issue {
    position: absolute; top: 90px; right: 80px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px; letter-spacing: .22em;
    color: rgba(26,24,20,.55); font-weight: 600;
  }

  /* Dimension corner mark */
  .dim {
    position: absolute; top: 60px; right: 80px; width: 140px; height: 14px;
  }
  .dim::before, .dim::after {
    content: ""; position: absolute; top: 0; width: 1px; height: 14px;
    background: rgba(30,58,95,.4);
  }
  .dim::before { left: 0; } .dim::after { right: 0; }
  .dim > span {
    position: absolute; top: 7px; left: 0; right: 0; height: 1px;
    background: rgba(30,58,95,.4);
  }

  .hero {
    position: absolute; left: 80px; right: 80px;
    top: 290px;
  }
  .hero .line1 {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 600; font-size: 130px; line-height: 1.0;
    letter-spacing: -0.03em; color: #1a1814;
    margin: 0;
  }
  .hero .line2 {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 700; font-size: 240px; line-height: 1.0;
    letter-spacing: -0.045em; color: #1a1814;
    margin: 28px 0 0; display: inline-block;
    background-image: linear-gradient(transparent 70%, rgba(181,132,71,.42) 70%);
    background-size: 100% 100%;
  }
  .hero .sub {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 500; font-style: italic;
    font-size: 50px; line-height: 1.18; color: #3a3833;
    margin: 60px 0 0;
    max-width: 980px;
  }

  .vertical-mark {
    position: absolute;
    left: 36px; top: 720px;
    transform: rotate(-90deg); transform-origin: left top;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; letter-spacing: .42em;
    color: rgba(26,24,20,.40); font-weight: 600;
    white-space: nowrap;
  }

  .bottom {
    position: absolute; left: 80px; right: 80px; bottom: 80px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .bottom .mark { width: 56px; height: 56px; border-radius: 10px;
    background: rgba(30,58,95,.10); display: grid; place-items: center; }
  .bottom .stats {
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px; letter-spacing: .32em;
    color: #1a1814; font-weight: 600;
  }
  .bottom .price {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 700; font-size: 56px; color: #1e3a5f;
    line-height: 1;
  }
</style>
</head>
<body>
<div class="cover">
  <div class="grid"></div>

  <div class="dim"><span></span></div>

  <div class="rule rule-top"></div>
  <div class="eyebrow">MANUAL №&nbsp;002 · A FIELD GUIDE FOR HOMEOWNERS</div>

  <div class="vertical-mark">JOSHUA BETESH · BUILT RIGHT TOOLS</div>

  <div class="hero">
    <div class="line1">The Owner's Rep</div>
    <div class="line2">Playbook.</div>
    <div class="sub">Run a major renovation like a<br/>professional owner's rep.</div>
  </div>

  <div class="rule rule-bottom"></div>
  <div class="bottom">
    <div class="mark" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="#1e3a5f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="9" width="18" height="6" rx="1"/>
        <path d="M7 9v3M11 9v4M15 9v3M19 9v4"/>
      </svg>
    </div>
    <div class="stats">55 PROMPTS&nbsp;&nbsp;·&nbsp;&nbsp;13 PHASES&nbsp;&nbsp;·&nbsp;&nbsp;PDF</div>
    <div class="price">$27</div>
  </div>
</div>
</body>
</html>
